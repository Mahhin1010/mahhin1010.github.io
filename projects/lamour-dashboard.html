<html>
<head>
<title>L'AMÒUR Events & Suites Dashboard</title>
<style>
  /* Basic styles for the dashboard page */
  body { 
    font-family: sans-serif; 
    margin: 20px; 
    background-color: #f4f4f9; 
  }
  
  h1 {
    text-align: center;
    color: #333;
  }

  /* Dashboard Controls */
  .dashboard-controls {
    display: flex;
    justify-content: flex-end;
    align-items: center; /* Vertically align buttons */
    gap: 10px; /* Space between buttons */
    margin-bottom: 15px;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }

  .control-btn {
    background: linear-gradient(135deg, #4da6ff, #2c7be5);
    color: white;
    text-decoration: none;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    display: inline-flex; /* For alignment */
    align-items: center;
  }

  .control-btn:hover {
    background: linear-gradient(135deg, #3a80c2, #1c5cba);
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
  }
  
  /* Info button specific style */
  .info-btn {
    width: 40px; 
    height: 40px; 
    padding: 0; 
    border-radius: 50%; 
    justify-content: center;
  }

  /* Dashboard Container */
  .dashboard-container {
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    margin-bottom: 20px;
    position: relative;
    background: #f8f9fa;
    width: 100%;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }

  .dashboard-container iframe {
    width: 100%;
    height: 80vh;
    border: none;
  }
  
  /* --- NEW: Disclaimer Marquee Popup --- */
  .disclaimer-marquee-popup {
    position: fixed;
    bottom: -100px; /* Start off-screen */
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 800px;
    background: linear-gradient(135deg, #333, #555);
    color: white;
    border-radius: 10px;
    padding: 15px 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 10000;
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Smooth, bouncy transition */
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .disclaimer-marquee-popup.show {
      bottom: 20px; /* Slide in */
      opacity: 1;
  }

  .marquee-container {
    flex-grow: 1;
    overflow: hidden; /* This hides the overflowing text */
    white-space: nowrap; /* Prevents text from wrapping */
  }

  .marquee-text {
    display: inline-block;
    padding-left: 100%; /* Start the text off-screen to the right */
    animation: scroll-left 25s linear infinite; /* Animation definition */
  }
  
  @keyframes scroll-left {
    0% {
      transform: translateX(0%);
    }
    100% {
      transform: translateX(-200%); /* Adjust based on text length if needed */
    }
  }

  .close-disclaimer {
    background: transparent;
    border: 2px solid white;
    color: white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 18px;
    cursor: pointer;
    margin-left: 20px;
    transition: all 0.3s;
  }
  
  .close-disclaimer:hover {
      background: white;
      color: #333;
  }
</style>
</head>
<body>

<h1>L'AMÒUR Events & Suites: YoY Comparison Dashboard</h1>

<!-- This div now holds BOTH buttons -->
<div class="dashboard-controls">
    <a href="/" class="control-btn">Back to Portfolio</a>
    <button id="info-btn" class="control-btn info-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
    </button>
</div>

<div class="dashboard-container">
    <iframe 
      id="dashboard-iframe"
      title="Lamour_Sales_Funnel_YoY_Comparison_MyWorkspace_09Apr25" 
      width="100%" 
      height="100%" 
      src="https://app.powerbi.com/view?r=eyJrIjoiMDY5ZTJlNDctODhhYi00MWM5LWEwNTEtNzE4OTM5ZmQ0NTc1IiwidCI6IjY1ZTM4Y2Y0LTc5MDUtNDYwYy05YzIwLTYwNDU4MGY2Zjc2NSIsImMiOjl9" 
      frameborder="0" 
      allowFullScreen="true">
    </iframe>
</div>

<!-- NEW Disclaimer Marquee Popup -->
<div id="disclaimer-popup" class="disclaimer-marquee-popup">
    <div class="marquee-container">
        <p class="marquee-text">
            While the project reflects real-world experience, all data displayed in the dashboard is completely synthetic, adhering to GDPR standards.
        </p>
    </div>
    <button id="close-disclaimer" class="close-disclaimer">&times;</button>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const infoBtn = document.getElementById('info-btn');
    const disclaimerPopup = document.getElementById('disclaimer-popup');
    const closeDisclaimerBtn = document.getElementById('close-disclaimer');

    infoBtn.addEventListener('click', function() {
      disclaimerPopup.classList.add('show');
    });

    closeDisclaimerBtn.addEventListener('click', function() {
      disclaimerPopup.classList.remove('show');
    });
  });
</script>

</body>
</html>
