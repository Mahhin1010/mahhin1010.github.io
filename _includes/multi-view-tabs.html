<style>
.multi-view-container {
  margin: 30px 0;
  border-radius: 12px;
  background: white;
  border: 1px solid #e0e0e0;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  overflow: hidden;
}

.multi-view-tabs {
  display: flex;
  background: #f8f9fa;
  border-bottom: 1px solid #e0e0e0;
  gap: 2px;
  padding: 10px 15px 0 15px;
  overflow-x: auto;
}

.multi-view-tab-btn {
  padding: 12px 20px;
  background: transparent;
  border: none;
  font-size: 15px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s ease;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0.8;
}

.multi-view-tab-btn:hover {
  color: #333;
  opacity: 1;
}

.multi-view-tab-btn.active {
  color: #E97627; /* Matching the orange from badges */
  border-bottom-color: #E97627;
  opacity: 1;
}

.multi-view-tab-btn.link-btn {
  margin-left: auto;
  color: #0A66C2; /* LinkedIn Blue */
  text-decoration: none;
  opacity: 1;
}
.multi-view-tab-btn.link-btn:hover {
  text-decoration: underline;
}

.multi-view-content {
  display: none;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}

.multi-view-content.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Mobile adjustments */
@media (max-width: 768px) {
  .multi-view-container {
    margin: 15px 0;
  }
  .multi-view-tabs {
    padding: 0;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* Firefox */
  }
  .multi-view-tabs::-webkit-scrollbar {
    display: none;
  }
  .multi-view-tab-btn {
    padding: 12px 14px;
    font-size: 14px;
    flex: 0 0 auto;
  }
  .multi-view-tab-btn svg {
    width: 16px;
    height: 16px;
  }
  .multi-view-tab-btn.link-btn {
    margin-left: 0;
  }
  .multi-view-content {
    padding: 15px 10px;
  }
}
</style>

{% assign container_id = include.id | slugify %}

<div class="multi-view-container" id="{{ container_id }}">
  <div class="multi-view-tabs">
    <button class="multi-view-tab-btn active" onclick="switchMultiViewTab('{{ container_id }}', 'dashboard')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Interactive Dashboard
    </button>
    <button class="multi-view-tab-btn" onclick="switchMultiViewTab('{{ container_id }}', 'case-study')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Read Case Study
    </button>
    {% if include.linkedin %}
    <a href="{{ include.linkedin }}" class="multi-view-tab-btn link-btn" target="_blank">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
      View LinkedIn Post
    </a>
    {% endif %}
  </div>

  <div class="multi-view-content dashboard active" id="content-{{ container_id }}-dashboard">
    {{ include.dashboard_html }}
  </div>

  <div class="multi-view-content case-study" id="content-{{ container_id }}-case-study">
    {{ include.case_study_html }}
  </div>
</div>

<script>
function switchMultiViewTab(containerId, tabName) {
  const container = document.getElementById(containerId);
  
  // Update Buttons
  const buttons = container.querySelectorAll('.multi-view-tab-btn:not(.link-btn)');
  buttons.forEach(btn => {
    btn.classList.remove('active');
    if(btn.getAttribute('onclick').includes(tabName)) {
      btn.classList.add('active');
    }
  });

  // Update Content
  const contents = container.querySelectorAll('.multi-view-content');
  contents.forEach(content => {
    content.classList.remove('active');
  });
  
  const activeContent = document.getElementById('content-' + containerId + '-' + tabName);
  if(activeContent) activeContent.classList.add('active');
}
</script>
